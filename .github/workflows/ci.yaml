name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate RTBot ref
        shell: bash
        run: |
          if [ -z "${{ vars.RTBOT_REF }}" ]; then
            echo "Repository variable RTBOT_REF must be set to an rtbot tag or commit SHA."
            exit 1
          fi

      - name: Validate RTBot auth token
        shell: bash
        env:
          RTBOT_REPO_READ_TOKEN: ${{ secrets.RTBOT_REPO_READ_TOKEN }}
        run: |
          if [ -z "$RTBOT_REPO_READ_TOKEN" ]; then
            echo "Repository secret RTBOT_REPO_READ_TOKEN must be set for cross-repo checkout."
            exit 1
          fi

      - name: Checkout RTBot
        shell: bash
        env:
          RTBOT_REPO_READ_TOKEN: ${{ secrets.RTBOT_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${RTBOT_REPO_READ_TOKEN}@github.com/rtbot-dev/rtbot.git" "${RUNNER_TEMP}/rtbot"
          git -C "${RUNNER_TEMP}/rtbot" checkout "${{ vars.RTBOT_REF }}"
          echo "RTBOT_DIR=${RUNNER_TEMP}/rtbot" >> "$GITHUB_ENV"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build
        run: bazel build --override_module=rtbot="${RTBOT_DIR}" //...

      - name: Test
        run: bazel test --override_module=rtbot="${RTBOT_DIR}" //...
