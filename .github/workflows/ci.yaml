name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate pinned RTBot ref
        shell: bash
        run: |
          if [ -z "${{ vars.RTBOT_REF }}" ]; then
            echo "Repository variable RTBOT_REF must be set to an rtbot tag or commit SHA."
            exit 1
          fi

      - name: Validate RTBot checkout token
        shell: bash
        env:
          RTBOT_REPO_READ_TOKEN: ${{ secrets.RTBOT_REPO_READ_TOKEN }}
        run: |
          if [ -z "$RTBOT_REPO_READ_TOKEN" ]; then
            echo "Repository secret RTBOT_REPO_READ_TOKEN must be set for cross-repo checkout."
            exit 1
          fi

      - name: Checkout pinned RTBot source
        shell: bash
        env:
          RTBOT_REPO_READ_TOKEN: ${{ secrets.RTBOT_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${RTBOT_REPO_READ_TOKEN}@github.com/rtbot-dev/rtbot.git" "${RUNNER_TEMP}/rtbot"
          git -C "${RUNNER_TEMP}/rtbot" checkout "${{ vars.RTBOT_REF }}"
          if [ ! -f "${RUNNER_TEMP}/rtbot/tools/BUILD.bazel" ]; then
            printf 'exports_files(["non_bcr_deps.bzl"])\n' > "${RUNNER_TEMP}/rtbot/tools/BUILD.bazel"
          fi
          echo "RTBOT_DIR=${RUNNER_TEMP}/rtbot" >> "$GITHUB_ENV"

      - name: Setup Bazel toolchain
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build all targets
        run: bazel build --override_module=rtbot="${RTBOT_DIR}" //...

      - name: Run test suite
        run: bazel test --override_module=rtbot="${RTBOT_DIR}" //...
