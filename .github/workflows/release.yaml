name: Release

permissions:
  contents: read

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build wheel (${{ matrix.target.platform }}-${{ matrix.target.arch }}, py${{ matrix.python-version }})
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        target:
          - os: ubuntu-latest
            arch: x86_64
            platform: linux
          - os: ubuntu-24.04-arm
            arch: aarch64
            platform: linux
          - # macos-13 is unavailable in this repo's runner configuration.
            # Use an explicit Intel image for x86_64 wheel builds.
            # Keep architecture tag as x86_64.
            os: macos-15-intel
            arch: x86_64
            platform: darwin
          - os: macos-latest
            arch: arm64
            platform: darwin
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate pinned RTBot ref
        shell: bash
        run: |
          if [ -z "${{ vars.RTBOT_REF }}" ]; then
            echo "Repository variable RTBOT_REF must be set to an rtbot tag or commit SHA."
            exit 1
          fi

      - name: Validate RTBot checkout token
        shell: bash
        env:
          RTBOT_REPO_READ_TOKEN: ${{ secrets.RTBOT_REPO_READ_TOKEN }}
        run: |
          if [ -z "$RTBOT_REPO_READ_TOKEN" ]; then
            echo "Repository secret RTBOT_REPO_READ_TOKEN must be set for cross-repo checkout."
            exit 1
          fi

      - name: Checkout pinned RTBot source
        shell: bash
        env:
          RTBOT_REPO_READ_TOKEN: ${{ secrets.RTBOT_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${RTBOT_REPO_READ_TOKEN}@github.com/rtbot-dev/rtbot.git" "${RUNNER_TEMP}/rtbot"
          git -C "${RUNNER_TEMP}/rtbot" checkout "${{ vars.RTBOT_REF }}"
          if [ ! -f "${RUNNER_TEMP}/rtbot/tools/BUILD.bazel" ]; then
            printf 'exports_files(["non_bcr_deps.bzl"])\n' > "${RUNNER_TEMP}/rtbot/tools/BUILD.bazel"
          fi
          echo "RTBOT_DIR=${RUNNER_TEMP}/rtbot" >> "$GITHUB_ENV"

      - name: Setup Bazel toolchain
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true

      - name: Resolve wheel ABI target
        id: resolve
        shell: bash
        run: |
          cp_tag="cp${{ matrix.python-version }}"
          cp_tag="${cp_tag/.}"

          echo "cp_tag=$cp_tag" >> "$GITHUB_OUTPUT"
          echo "wheel_target=//runtimes/python:rtbot_sql_whl_${cp_tag}" >> "$GITHUB_OUTPUT"

      - name: Build wheel with Bazel
        run: bazel build --override_module=rtbot="${RTBOT_DIR}" --cxxopt=-Wno-c++11-narrowing "${{ steps.resolve.outputs.wheel_target }}"

      - name: Upload built wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtbot-sql-wheel-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ steps.resolve.outputs.cp_tag }}
          path: dist/bin/runtimes/python/**/*${{ steps.resolve.outputs.cp_tag }}*.whl
          if-no-files-found: error

      # TODO (batch 21): build release targets, create tarball + SHA256, upload artifacts

  release:
    name: Publish release wheel assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rtbot-sql-wheel-*
          path: release-wheels
          merge-multiple: true

      - name: Validate wheel artifact count
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          wheels=(release-wheels/*.whl)
          count=${#wheels[@]}
          expected=16

          if [ "$count" -ne "$expected" ]; then
            echo "Expected $expected wheels, found $count"
            ls -la release-wheels
            exit 1
          fi

          echo "Validated $count wheel artifacts"

      - name: Attach wheels to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-wheels/*.whl
