name: Release

permissions:
  contents: read

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        target:
          - os: ubuntu-latest
            arch: x86_64
            platform: linux
          - os: ubuntu-24.04-arm
            arch: aarch64
            platform: linux
          - os: macos-13
            arch: x86_64
            platform: darwin
          - os: macos-latest
            arch: arm64
            platform: darwin
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate RTBot ref
        shell: bash
        run: |
          if [ -z "${{ vars.RTBOT_REF }}" ]; then
            echo "Repository variable RTBOT_REF must be set to an rtbot tag or commit SHA."
            exit 1
          fi

      - name: Create RTBot app token
        id: rtbot_app_token
        if: ${{ secrets.RTBOT_APP_ID != '' && secrets.RTBOT_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RTBOT_APP_ID }}
          private-key: ${{ secrets.RTBOT_APP_PRIVATE_KEY }}
          owner: rtbot-dev

      - name: Checkout RTBot
        uses: actions/checkout@v4
        with:
          repository: rtbot-dev/rtbot
          ref: ${{ vars.RTBOT_REF }}
          token: ${{ steps.rtbot_app_token.outputs.token || secrets.RTBOT_REPO_READ_TOKEN || github.token }}
          path: rtbot

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true

      - name: Resolve wheel target
        id: resolve
        shell: bash
        run: |
          cp_tag="cp${{ matrix.python-version }}"
          cp_tag="${cp_tag/.}"

          echo "cp_tag=$cp_tag" >> "$GITHUB_OUTPUT"
          echo "wheel_target=//runtimes/python:rtbot_sql_whl_${cp_tag}" >> "$GITHUB_OUTPUT"

      - name: Build release wheel
        run: bazel build --override_module=rtbot="${GITHUB_WORKSPACE}/rtbot" "${{ steps.resolve.outputs.wheel_target }}"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtbot-sql-wheel-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ steps.resolve.outputs.cp_tag }}
          path: dist/bin/runtimes/python/**/*${{ steps.resolve.outputs.cp_tag }}*.whl
          if-no-files-found: error

      # TODO (batch 21): build release targets, create tarball + SHA256, upload artifacts

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rtbot-sql-wheel-*
          path: release-wheels
          merge-multiple: true

      - name: Validate expected wheel count
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          wheels=(release-wheels/*.whl)
          count=${#wheels[@]}
          expected=16

          if [ "$count" -ne "$expected" ]; then
            echo "Expected $expected wheels, found $count"
            ls -la release-wheels
            exit 1
          fi

          echo "Validated $count wheel artifacts"

      - name: Attach wheels to GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: release-wheels/*.whl
